format = "$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh${custom.jj}$fossil_branch$fossil_metrics$git_commit$git_state$git_metrics$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character"

[custom.jj]
command = """current_bm=$(jj log --no-graph -r @ -T 'local_bookmarks.map(|b| b.name()).join("")' 2>/dev/null); if [ -z "$current_bm" ]; then parent_bm=$(jj log --no-graph -r 'heads(ancestors(@-) & bookmarks())' -T 'local_bookmarks.map(|b| b.name()).join("|")' 2>/dev/null); fi; current=$(jj log --no-graph -r @ -T 'separate(" ", change_id.shortest(), if(local_bookmarks, "(" ++ local_bookmarks.map(|b| b.name() ++ if(!remote_bookmarks.filter(|rb| rb.remote() == "origin" && rb.name() == b.name()), "✦", remote_bookmarks.filter(|rb| rb.remote() == "origin" && rb.name() == b.name()).map(|rb| if(rb.tracking_ahead_count().upper() > 0, "↑") ++ if(rb.tracking_behind_count().upper() > 0, "↓")).join(""))).join("|") ++ ")"), if(empty, "○", "✎"))' 2>/dev/null); if [ -n "$parent_bm" ]; then echo "($parent_bm) → $current"; else echo "$current"; fi"""
when = "jj root 2>/dev/null"
symbol = "🥋 "
format = "[$symbol$output]($style) "
style = "bold purple"
