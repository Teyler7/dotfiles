"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[git]
write-change-id-header = true

[signing]
backend   = "ssh"
behavior  = "own"
key       = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMAg0bo8XRuPNC6vvtTWhiFBr8do+wCO6k4XRkRCDsgf"

[signing.backends.ssh]
program = "op-ssh-sign"

[user]
name = "Teyler Halama"
email = "teyler@hey.com"

[ui]
editor = "nvim"
default-command = "l"

[aliases]
l = ["log", "--no-pager", "-n", "5"]

[revsets]
short-prefixes = '(mine() & committer_date(after:"1 day ago")) | (main::@)::'

[templates]
draft_commit_description = """
concat(
  description,
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.summary()),
  ),
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.stat(72)),
  ),
  "\n",
  "JJ: ignore-rest\n",
  diff.git(),
)
"""

